<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weatherchart</title>
    <link rel="stylesheet" href="../weatherchart/fontawesome-free-7.1.0-web/css/all.min.css">
    <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #0ea5e9 0%, #38bdf8 50%, #bae6fd 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 14px 60px;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Righteous', cursive;
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      color: white;
      text-shadow: 0 4px 15px rgba(0,0,0,0.2);
      margin-bottom: 4px;
    }

    .subtitle {
      color: rgba(255,255,255,0.85);
      font-weight: 700;
      font-size: clamp(0.8rem, 3vw, 1rem);
      margin-bottom: 26px;
      text-align: center;
    }

    .search-wrap {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 460px;
      margin-bottom: 20px;
    }

    .search-wrap input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.25);
      color: white;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      outline: none;
      backdrop-filter: blur(10px);
      min-width: 0;
    }

    .search-wrap input::placeholder { color: rgba(255,255,255,0.7); }
    .search-wrap input:focus {
      border-color: #fbbf24;
      background: rgba(255,255,255,0.35);
    }

    .search-wrap button {
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: #fbbf24;
      color: #1e3a5f;
      font-family: 'Righteous', cursive;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(251,191,36,0.5);
      transition: transform 0.2s;
      white-space: nowrap;
    }

    .search-wrap button:hover { transform: scale(1.05); }
    .search-wrap button:active { transform: scale(0.97); }

    .error-msg {
      background: rgba(239,68,68,0.85);
      color: white;
      padding: 10px 22px;
      border-radius: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: none;
      font-size: 0.9rem;
      text-align: center;
    }

    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: 700;
      margin: 20px 0;
    }

    .spinner {
      width: 42px; height: 42px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .weather-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,0.4);
      padding: clamp(20px, 5vw, 30px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      display: none;
      animation: cardPop 0.5s ease both;
    }

    @keyframes cardPop {
      from { opacity:0; transform: scale(0.85) translateY(30px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .day-badge {
      display: inline-block;
      background: #fbbf24;
      color: #1e3a5f;
      font-family: 'Righteous', cursive;
      font-size: 0.8rem;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 10px;
    }

    .city-name {
      font-family: 'Righteous', cursive;
      font-size: clamp(1.6rem, 6vw, 2rem);
      color: white;
    }

    .country {
      color: rgba(255,255,255,0.8);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .weather-icon {
      font-size: clamp(3.5rem, 12vw, 5rem);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .temp {
      font-family: 'Righteous', cursive;
      font-size: clamp(3rem, 12vw, 4.5rem);
      color: white;
      line-height: 1;
    }

    .temp sup { font-size: 1.5rem; vertical-align: super; }

    .description {
      text-transform: capitalize;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      color: rgba(255,255,255,0.95);
      font-weight: 700;
      margin-bottom: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1.5px solid rgba(255,255,255,0.3);
      transition: transform 0.2s;
    }

    .stat-box:hover { transform: scale(1.03); }

    .stat-label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.75);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Righteous', cursive;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: white;
    }

    .bar-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.75);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .bar-track {
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #34d399, #fbbf24, #f87171);
      width: 0%;
      transition: width 1s ease;
    }

    .credit {
      margin-top: 30px;
      color: rgba(255,255,255,0.6);
      font-size: 0.78rem;
      font-weight: 700;
      text-align: center;
    }
  </style>
</head>
     
<body>
  <h1>WeatherVibes 🌤️</h1>
  <p class="subtitle">Real-time weather, anywhere on Earth</p>

  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="Enter city... e.g Lagos"/>
    <button onclick="getWeather()">Search 🔍</button>
  </div>

  <div class="error-msg" id="errorMsg">❌ City not found! Check spelling.</div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>Fetching vibes... ✨</span>
  </div>

  <div class="weather-card" id="weatherCard">
    <div class="day-badge" id="dayBadge"></div>
    <div class="city-name" id="cityName"></div>
    <div class="country" id="countryName"></div>

    <div class="weather-main">
      <div class="weather-icon" id="weatherIcon"></div>
      <div class="temp" id="temp"></div>
    </div>

    <div class="description" id="description"></div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">💧 Humidity</div>
        <div class="stat-value" id="humidity">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">💨 Wind</div>
        <div class="stat-value" id="wind">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">👁️ Visibility</div>
        <div class="stat-value" id="visibility">--</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">🌡️ Feels Like</div>
        <div class="stat-value" id="feelsLike">--</div>
      </div>
    </div>

    <div class="bar-label">Temperature Scale (0°C → 50°C)</div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>

  <p class="credit">Powered by OpenWeatherMap 🌍</p>

  <script>
    const API_KEY = '58ffefa14d49e4a3572ab0251f2be35f';

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    function getWeatherIcon(main) {
      const icons = {
        Clear: '☀️', Clouds: '⛅', Rain: '🌧️',
        Drizzle: '🌦️', Thunderstorm: '⛈️', Snow: '❄️',
        Mist: '🌫️', Fog: '🌫️', Haze: '🌫️',
        Dust: '🌪️', Smoke: '💨', Tornado: '🌪️'
      };
      return icons[main] || '🌡️';
    }

    async function getWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) return;

      const errorMsg   = document.getElementById('errorMsg');
      const loading    = document.getElementById('loading');
      const weatherCard = document.getElementById('weatherCard');

      errorMsg.style.display = 'none';
      weatherCard.style.display = 'none';
      loading.style.display = 'flex';

      try {
        const res = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
        );

        if (!res.ok) throw new Error('City not found');

        const data = await res.json();

        document.getElementById('dayBadge').textContent    = days[new Date().getDay()];
        document.getElementById('cityName').textContent    = data.name;
        document.getElementById('countryName').textContent = `🌍 ${data.sys.country}`;
        document.getElementById('weatherIcon').textContent = getWeatherIcon(data.weather[0].main);
        document.getElementById('temp').innerHTML          = `${Math.round(data.main.temp)}<sup>°C</sup>`;
        document.getElementById('description').textContent = data.weather[0].description;
        document.getElementById('humidity').textContent    = `${data.main.humidity}%`;
        document.getElementById('wind').textContent        = `${Math.round(data.wind.speed)} m/s`;
        document.getElementById('visibility').textContent  = `${(data.visibility / 1000).toFixed(1)} km`;
        document.getElementById('feelsLike').innerHTML     = `${Math.round(data.main.feels_like)}<sup>°C</sup>`;

        const pct = Math.min(Math.max(data.main.temp / 50 * 100, 5), 100);
        document.getElementById('barFill').style.width = pct + '%';

        loading.style.display = 'none';
        weatherCard.style.display = 'block';

      } catch (e) {
        loading.style.display = 'none';
        errorMsg.style.display = 'block';
      }
    }

    document.getElementById('cityInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') getWeather();
    });
  </script>
</body>
</html>
